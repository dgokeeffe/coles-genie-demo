resources:
  jobs:
    download_grocery_pdfs:
      name: download-grocery-pdfs-${bundle.target}
      tasks:
        - task_key: download
          notebook_task:
            notebook_path: ../src/jobs/download_grocery_pdfs.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
